# Deploy:  flyctl deploy --config ops/fly/web.fly.toml --dockerfile apps/web/Dockerfile \
#            --build-arg NEXT_PUBLIC_AGENT_BASE_URL=https://oncallpilot-agent.fly.dev
app = "oncallpilot-web"
primary_region = "fra"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  method = "get"
  path = "/api/health"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
