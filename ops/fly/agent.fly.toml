# Deploy:  flyctl deploy --config ops/fly/agent.fly.toml --dockerfile services/agent/Dockerfile
# (run from repo root; requires `flyctl apps create oncallpilot-agent` first)
app = "oncallpilot-agent"
primary_region = "fra"

[build]

[env]
  CORS_ALLOW_ORIGINS = "https://oncallpilot-web.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false     # always-on: SSE connections must not be paused
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  method = "get"
  path = "/healthz"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
