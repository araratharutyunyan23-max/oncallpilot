# Run from the repo root:  docker compose -f ops/docker-compose.yml up --build
# (the Makefile wraps this). Phase 0 has no database.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: oncallpilot
      POSTGRES_PASSWORD: oncallpilot
      POSTGRES_DB: oncallpilot
    ports:
      - "55432:5432"   # host 55432 (5432/5433 are taken by other local projects)
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../services/agent/app/retrieval/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncallpilot -d oncallpilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  agent:
    build:
      context: ../services/agent
    env_file:
      - ../.env
    environment:
      CORS_ALLOW_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').getcode()==200 else 1)"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_AGENT_BASE_URL: "http://localhost:8000"
    environment:
      NEXT_PUBLIC_AGENT_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      agent:
        condition: service_healthy

volumes:
  pgdata:
