name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_AGENT_BASE_URL: "http://localhost:8000"
          NEXT_TELEMETRY_DISABLED: "1"

  # Phase 0 has no eval-gate — that lands in P3 (evals-pr.yml).
